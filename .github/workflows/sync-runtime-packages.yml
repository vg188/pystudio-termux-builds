name: Sync Runtime Package Manifest

on:
  workflow_dispatch:
    inputs:
      extension_tag:
        description: "Optional pystudio-python-extensions release tag to import."
        required: false
        default: ""
      sync_modelscope:
        description: "Mirror flat package indexes and .deb assets to ModelScope. Disabled by default."
        required: false
        type: boolean
        default: false
      update_gitee:
        description: "Push lightweight CN mirror indexes to Gitee."
        required: false
        type: boolean
        default: true
      gitee_owner:
        description: "Gitee owner."
        required: false
        default: yourba
      gitee_repo:
        description: "Gitee repository."
        required: false
        default: pystudio-termux-builds
      gitee_branch:
        description: "Gitee branch."
        required: false
        default: main
  repository_dispatch:
    types:
      - runtime-packages-sync

permissions:
  contents: write

concurrency:
  group: sync-runtime-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-runtime-packages:
    name: Update manifests and mirrors
    runs-on: ubuntu-24.04
    env:
      SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || '' }}
      PAYLOAD_RELEASE_TAG: ${{ github.event.client_payload.release_tag || '' }}
      INPUT_EXTENSION_TAG: ${{ github.event.inputs.extension_tag || '' }}
      SYNC_MODELSCOPE: ${{ github.event.client_payload.sync_modelscope || github.event.inputs.sync_modelscope || (github.event_name == 'repository_dispatch' && 'true') || 'false' }}
      UPDATE_GITEE: ${{ github.event.client_payload.update_gitee || github.event.inputs.update_gitee || 'true' }}
      GITEE_OWNER: ${{ github.event.inputs.gitee_owner || 'yourba' }}
      GITEE_REPO: ${{ github.event.inputs.gitee_repo || 'pystudio-termux-builds' }}
      GITEE_BRANCH: ${{ github.event.inputs.gitee_branch || 'main' }}
      MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "PyStudio Bot"
          git config --global user.email "pystudio-bot@users.noreply.github.com"

      - name: Update GitHub runtime manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          args=(--manifest runtime-packages.json)
          extension_tag="$INPUT_EXTENSION_TAG"
          if [[ "$SOURCE_REPOSITORY" == "vg188/pystudio-python-extensions" && -n "$PAYLOAD_RELEASE_TAG" ]]; then
            extension_tag="$PAYLOAD_RELEASE_TAG"
          fi
          if [[ -n "$extension_tag" ]]; then
            args+=(--extension-tag "$extension_tag")
          fi
          python3 scripts/ci/update-runtime-packages.py "${args[@]}"
          python3 -m json.tool runtime-packages.json >/dev/null
          python3 scripts/ci/update-package-assets-index.py \
            --manifest runtime-packages.json \
            --assets-output package-assets.json \
            --indexes-output package-indexes.json \
            --cache-output package-index-cache.json \
            --batches-output package-build-batches.json
          python3 -m json.tool package-assets.json >/dev/null
          python3 -m json.tool package-indexes.json >/dev/null
          python3 -m json.tool package-index-cache.json >/dev/null
          python3 -m json.tool package-build-batches.json >/dev/null

      - name: Install ModelScope CLI
        if: ${{ env.SYNC_MODELSCOPE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade modelscope
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync package repositories to ModelScope
        if: ${{ env.SYNC_MODELSCOPE == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "$MODELSCOPE_TOKEN"
          modelscope_args=(
            --manifest runtime-packages.json \
            --modelscope-token "$MODELSCOPE_TOKEN" \
            --github-token "$GITHUB_TOKEN" \
            --progress-interval 2
          )
          if [[ -n "$PAYLOAD_RELEASE_TAG" ]]; then
            modelscope_args+=(--include "$PAYLOAD_RELEASE_TAG")
          fi
          python3 scripts/local/modelscope_release_relay.py "${modelscope_args[@]}"

      - name: Commit GitHub manifest
        shell: bash
        run: |
          set -euo pipefail
          git add runtime-packages.json package-assets.json package-indexes.json package-index-cache.json package-build-batches.json
          if git diff --cached --quiet; then
            echo "No GitHub manifest changes to commit."
          else
            git commit -m "chore: update runtime package manifest"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Push runtime manifest to Gitee
        if: ${{ env.UPDATE_GITEE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$GITEE_TOKEN" ]]; then
            echo "::warning::GITEE_TOKEN is not configured; skipping Gitee manifest mirror."
            exit 0
          fi
          python3 scripts/ci/prepare-gitee-mirror.py \
            --runtime-manifest runtime-packages.json \
            --package-assets package-assets.json \
            --package-indexes package-indexes.json \
            --output-dir dist/gitee-mirror \
            --modelscope-synced "$SYNC_MODELSCOPE"
          python3 scripts/ci/push-gitee-files.py \
            --owner "$GITEE_OWNER" \
            --repo "$GITEE_REPO" \
            --branch "$GITEE_BRANCH" \
            --token "$GITEE_TOKEN" \
            --message "chore: update CN runtime package mirror index" \
            --retries 3 \
            --timeout 60 \
            --file dist/gitee-mirror/runtime-packages.json=runtime-packages.json \
            --file dist/gitee-mirror/mirror-status.json=mirror-status.json
