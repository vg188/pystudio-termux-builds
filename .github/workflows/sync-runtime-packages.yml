name: Sync Runtime Package Manifest

on:
  workflow_dispatch:
    inputs:
      extension_tag:
        description: "Optional pystudio-python-extensions release tag to import."
        required: false
        default: ""
      sync_modelscope:
        description: "Mirror flat package indexes and .deb assets to ModelScope. Disabled by default."
        required: false
        type: boolean
        default: false
      update_gitee:
        description: "Push the lightweight runtime-packages.json manifest to Gitee."
        required: false
        type: boolean
        default: true
      gitee_owner:
        description: "Gitee owner."
        required: false
        default: yourba
      gitee_repo:
        description: "Gitee repository."
        required: false
        default: pystudio-termux-builds
      gitee_branch:
        description: "Gitee branch."
        required: false
        default: main
  repository_dispatch:
    types:
      - runtime-packages-sync

permissions:
  contents: write

concurrency:
  group: sync-runtime-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-runtime-packages:
    name: Update manifests and mirrors
    runs-on: ubuntu-24.04
    env:
      SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || '' }}
      PAYLOAD_RELEASE_TAG: ${{ github.event.client_payload.release_tag || '' }}
      INPUT_EXTENSION_TAG: ${{ github.event.inputs.extension_tag || '' }}
      SYNC_MODELSCOPE: ${{ github.event.client_payload.sync_modelscope || github.event.inputs.sync_modelscope || 'false' }}
      UPDATE_GITEE: ${{ github.event.client_payload.update_gitee || github.event.inputs.update_gitee || 'true' }}
      GITEE_OWNER: ${{ github.event.inputs.gitee_owner || 'yourba' }}
      GITEE_REPO: ${{ github.event.inputs.gitee_repo || 'pystudio-termux-builds' }}
      GITEE_BRANCH: ${{ github.event.inputs.gitee_branch || 'main' }}
      MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "PyStudio Bot"
          git config --global user.email "pystudio-bot@users.noreply.github.com"

      - name: Update GitHub runtime manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          args=(--manifest runtime-packages.json)
          extension_tag="$INPUT_EXTENSION_TAG"
          if [[ "$SOURCE_REPOSITORY" == "vg188/pystudio-python-extensions" && -n "$PAYLOAD_RELEASE_TAG" ]]; then
            extension_tag="$PAYLOAD_RELEASE_TAG"
          fi
          if [[ -n "$extension_tag" ]]; then
            args+=(--extension-tag "$extension_tag")
          fi
          python3 scripts/ci/update-runtime-packages.py "${args[@]}"
          python3 -m json.tool runtime-packages.json >/dev/null
          python3 scripts/ci/update-package-assets-index.py \
            --manifest runtime-packages.json \
            --output package-assets-index.json
          python3 -m json.tool package-assets-index.json >/dev/null

      - name: Install ModelScope CLI
        if: ${{ env.SYNC_MODELSCOPE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade modelscope
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync package repositories to ModelScope
        if: ${{ env.SYNC_MODELSCOPE == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "$MODELSCOPE_TOKEN"
          python3 scripts/local/modelscope_release_relay.py \
            --manifest runtime-packages.json \
            --modelscope-token "$MODELSCOPE_TOKEN" \
            --github-token "$GITHUB_TOKEN" \
            --progress-interval 2

      - name: Commit GitHub manifest
        shell: bash
        run: |
          set -euo pipefail
          git add runtime-packages.json package-assets-index.json
          if git diff --cached --quiet; then
            echo "No GitHub manifest changes to commit."
          else
            git commit -m "chore: update runtime package manifest"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Push runtime manifest to Gitee
        if: ${{ env.UPDATE_GITEE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$GITEE_TOKEN" ]]; then
            echo "::warning::GITEE_TOKEN is not configured; skipping Gitee manifest mirror."
            exit 0
          fi

          retry_gitee() {
            local label="$1"
            shift
            local attempt delay
            for attempt in 1 2 3 4; do
              if "$@"; then
                return 0
              fi
              delay=$((attempt * 20))
              echo "::warning::Gitee ${label} failed on attempt ${attempt}; retrying in ${delay}s."
              sleep "$delay"
            done
            echo "::warning::Gitee ${label} failed after retries; GitHub runtime-packages.json remains the source of truth."
            return 1
          }

          rm -rf gitee-repo
          if ! retry_gitee "clone" git clone "https://${GITEE_OWNER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git" gitee-repo; then
            exit 0
          fi
          cd gitee-repo

          if git rev-parse --verify "origin/${GITEE_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "$GITEE_BRANCH" "origin/${GITEE_BRANCH}"
          else
            git checkout -B "$GITEE_BRANCH"
          fi

          cp ../runtime-packages.json runtime-packages.json
          cp ../package-assets-index.json package-assets-index.json
          git add runtime-packages.json package-assets-index.json
          if git diff --cached --quiet; then
            echo "No Gitee manifest changes to commit."
          else
            git commit -m "chore: update runtime package manifest"
            if ! retry_gitee "push" git push origin "HEAD:${GITEE_BRANCH}"; then
              exit 0
            fi
          fi
