name: Sync Runtime Packages to Gitee

on:
  workflow_dispatch:
    inputs:
      gitee_owner:
        description: "Gitee owner."
        required: false
        default: yourba
      gitee_repo:
        description: "Gitee repository."
        required: false
        default: pystudio-termux-builds
      gitee_tag:
        description: "Gitee release tag. Leave empty to use this run number."
        required: false
        default: ""
      gitee_branch:
        description: "Gitee branch that stores runtime-packages.json."
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: sync-runtime-packages-to-gitee-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-gitee-release:
    name: Sync runtime packages to Gitee
    runs-on: ubuntu-24.04
    env:
      GITEE_OWNER: ${{ github.event.inputs.gitee_owner || 'yourba' }}
      GITEE_REPO: ${{ github.event.inputs.gitee_repo || 'pystudio-termux-builds' }}
      GITEE_BRANCH: ${{ github.event.inputs.gitee_branch || 'main' }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Gitee release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.gitee_tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-}"
          if [[ -z "$tag" ]]; then
            tag="pystudio-runtime-packages-r${GITHUB_RUN_NUMBER}"
          fi
          {
            echo "tag=$tag"
            echo "name=PyStudio runtime packages ${tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate secret
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GITEE_TOKEN"

      - name: Download assets and generate Gitee manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/ci/sync-gitee-release.py prepare \
            --manifest runtime-packages.json \
            --output-dir gitee-sync \
            --gitee-owner "$GITEE_OWNER" \
            --gitee-repo "$GITEE_REPO" \
            --gitee-tag "${{ steps.release.outputs.tag }}"

      - name: Ensure Gitee repository branch exists
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "PyStudio Bot"
          git config --global user.email "pystudio-bot@users.noreply.github.com"

          rm -rf gitee-repo
          git clone "https://${GITEE_OWNER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git" gitee-repo
          cd gitee-repo

          if git rev-parse --verify "origin/${GITEE_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "$GITEE_BRANCH" "origin/${GITEE_BRANCH}"
          else
            git checkout -B "$GITEE_BRANCH"
          fi

          if [[ ! -f README.md ]]; then
            printf '# PyStudio Termux Builds\n\nRuntime package mirror for PyStudio.\n' > README.md
          fi

          git add README.md
          if git diff --cached --quiet; then
            echo "Gitee branch already exists."
          else
            git commit -m "chore: initialize runtime package mirror"
            git push origin "HEAD:${GITEE_BRANCH}"
          fi

      - name: Create Gitee release and upload assets
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/sync-gitee-release.py publish \
            --files-dir gitee-sync/files \
            --gitee-owner "$GITEE_OWNER" \
            --gitee-repo "$GITEE_REPO" \
            --gitee-tag "${{ steps.release.outputs.tag }}" \
            --gitee-token "$GITEE_TOKEN" \
            --target-commitish "$GITEE_BRANCH" \
            --release-name "${{ steps.release.outputs.name }}" \
            --release-body "Mirrored from GitHub runtime-packages.json in ${GITHUB_REPOSITORY}@${GITHUB_SHA}."

      - name: Push runtime-packages.json to Gitee repository
        shell: bash
        run: |
          set -euo pipefail
          cd gitee-repo
          cp ../gitee-sync/files/runtime-packages.json runtime-packages.json
          git add runtime-packages.json
          if git diff --cached --quiet; then
            echo "No Gitee manifest changes to commit."
          else
            git commit -m "chore: update runtime package mirror links"
            git push origin "HEAD:${GITEE_BRANCH}"
          fi
