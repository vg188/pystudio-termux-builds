name: Validate PyStudio Build Orchestrator

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate profiles and scripts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/ci/*.sh; do
            bash -n "$script"
          done

      - name: Check Python syntax
        shell: bash
        run: |
          set -euo pipefail
          find scripts -type f -name '*.py' -print0 | xargs -0 python3 -m py_compile

      - name: Validate runtime manifest schema
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("runtime-packages.json").read_text(encoding="utf-8"))
          assert manifest["schemaVersion"] == 5
          assert manifest["architectures"] == ["aarch64", "arm", "i686", "x86_64"]
          assert "entries" in manifest and isinstance(manifest["entries"], list)
          assert "repositories" in manifest and isinstance(manifest["repositories"], dict)
          assert manifest["packageManagement"]["mode"] == "apt-repository-v1"
          assert "components" not in manifest
          assert "componentPackages" not in manifest
          assert "items" not in manifest

          ids = set()
          for entry in manifest["entries"]:
              assert entry["id"] not in ids
              ids.add(entry["id"])
              for key in (
                  "kind",
                  "group",
                  "profile",
                  "title",
                  "description",
                  "packages",
                  "commands",
                  "source",
                  "release",
                  "install",
                  "availableArchitectures",
              ):
                  assert key in entry, (entry["id"], key)
              if entry["kind"] == "bootstrap":
                  assert entry["install"]["mode"] == "extract-rootfs"
                  assert sorted(entry["artifacts"], key=manifest["architectures"].index) == entry["availableArchitectures"]
                  for arch, artifacts in entry["artifacts"].items():
                      assert arch in manifest["architectures"]
                      assert any(artifact["role"] == "rootfs" for artifact in artifacts)
                      for artifact in artifacts:
                          for key in ("role", "fileName", "format", "downloadUrl", "size"):
                              assert key in artifact, (entry["id"], arch, key)
              elif entry["kind"] == "package-set":
                  assert entry["install"]["mode"] == "install-from-package-repository"
                  assert sorted(entry["repositoryRefs"], key=manifest["architectures"].index) == entry["availableArchitectures"]
                  for arch, ref in entry["repositoryRefs"].items():
                      assert arch in manifest["architectures"]
                      assert ref in manifest["repositories"], (entry["id"], arch, ref)
                      assert manifest["repositories"][ref]["architecture"] == arch
              else:
                  raise AssertionError(entry["kind"])

          for repo_id, repository in manifest["repositories"].items():
              assert repository["id"] == repo_id
              assert repository["kind"] == "apt-repository"
              assert repository["format"] == "apt-repo-v1"
              assert repository["architecture"] in manifest["architectures"]
              assert repository["indexPath"].endswith("/Packages.xz")
              for key in ("profile", "distribution", "component", "packageRoot", "version", "release", "snapshot", "mirrors"):
                  assert key in repository, (repo_id, key)
              snapshot = repository["snapshot"]
              for key in ("role", "fileName", "format", "downloadUrl", "size"):
                  assert key in snapshot, (repo_id, key)
          PY

      - name: Validate legacy migration plan
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path("migration/runtime-packages-v2-components.json").read_text(encoding="utf-8"))
          assert plan["schemaVersion"] == 1
          assert len(plan["entries"]) == 15
          ids = set()
          arches = ["aarch64", "arm", "i686", "x86_64"]
          for entry in plan["entries"]:
              assert entry["id"] not in ids
              ids.add(entry["id"])
              assert entry["release"]["repository"].startswith("https://github.com/")
              assert entry["release"]["tag"]
              assert sorted(entry["debianPackageAssets"]) == arches
              for arch, asset in entry["debianPackageAssets"].items():
                  assert asset.endswith(f"-debs-{arch}.tar.gz"), (entry["id"], arch, asset)
          PY

      - name: Validate toolchain profiles
        shell: bash
        run: |
          set -euo pipefail
          for profile in profiles/toolchains/*.env; do
            (
              set -euo pipefail
              # shellcheck disable=SC1090
              source "$profile"
              test -n "$PROFILE_SLUG"
              test -n "$PROFILE_NAME"
              test -n "$DEFAULT_PACKAGES"
            )
          done

      - name: Validate source adapters
        shell: bash
        run: |
          set -euo pipefail
          for source in sources/*.env; do
            (
              set -euo pipefail
              # shellcheck disable=SC1090
              source "$source"
              test -n "$SOURCE_ID"
              test -n "$SOURCE_NAME"
              test -n "$SOURCE_REPO"
              test -n "$SOURCE_UPSTREAM_REPO"
              test -n "$SOURCE_UPSTREAM_PARENT"
              test -n "$SOURCE_FORK_REPO"
              test -n "$SOURCE_PATCH_SET"
              test -n "$SOURCE_FALLBACK_ORDER"
              test -f "patches/source-adapters/$SOURCE_PATCH_SET/series"
            )
          done

      - name: Validate bootstrap profiles
        shell: bash
        run: |
          set -euo pipefail
          for profile in profiles/bootstrap/*.env; do
            (
              set -euo pipefail
              # shellcheck disable=SC1090
              source "$profile"
              test -n "$PROFILE_SLUG"
              test -n "$PROFILE_NAME"
              test -n "$SOURCE_REPO"
              test -n "$ARTIFACT_PREFIX"
              test -n "$BOOTSTRAP_ALIAS_SUFFIX"
            )
          done

      - name: Validate matrix generation
        shell: bash
        run: |
          set -euo pipefail
          python_profiles="python python-build python-science python-data python-image python-viz python-xml-html python-crypto-network python-gui-tk"
          dev_tool_profiles="python-lsp cpp-lsp debug-tools git"
          sources="primary secondary tur"
          toolchain_matrix_json="$(
            for p in python nodejs cpp proot; do
              for s in $sources; do
                for a in aarch64 arm i686 x86_64; do
                  jq -n --arg profile "$p" --arg source "$s" --arg arch "$a" \
                    '{profile: $profile, source: $source, arch: $arch}'
                done
              done
            done | jq -s -c .
          )"
          jq -e 'length == 48' <<< "$toolchain_matrix_json"

          python_matrix_json="$(
            for p in $python_profiles; do
              test -f "profiles/toolchains/$p.env"
              for s in $sources; do
                for a in aarch64 arm i686 x86_64; do
                  jq -n --arg profile "$p" --arg source "$s" --arg arch "$a" \
                    '{profile: $profile, source: $source, arch: $arch}'
                done
              done
            done | jq -s -c .
          )"
          jq -e 'length == 108' <<< "$python_matrix_json"

          tree_sitter_matrix_json="$(
            test -f "profiles/toolchains/tree-sitter.env"
            for s in $sources; do
              for a in aarch64 arm i686 x86_64; do
                jq -n --arg profile "tree-sitter" --arg source "$s" --arg arch "$a" \
                  '{profile: $profile, source: $source, arch: $arch}'
              done
            done | jq -s -c .
          )"
          jq -e 'length == 12' <<< "$tree_sitter_matrix_json"

          dev_tool_matrix_json="$(
            for p in $dev_tool_profiles; do
              test -f "profiles/toolchains/$p.env"
              for s in $sources; do
                for a in aarch64 arm i686 x86_64; do
                  jq -n --arg profile "$p" --arg source "$s" --arg arch "$a" \
                    '{profile: $profile, source: $source, arch: $arch}'
                done
              done
            done | jq -s -c .
          )"
          jq -e 'length == 48' <<< "$dev_tool_matrix_json"

          bootstrap_matrix_json="$(
            for p in base python-pip; do
              for a in aarch64 arm i686 x86_64; do
                jq -n --arg profile "$p" --arg arch "$a" \
                  '{profile: $profile, arch: $arch}'
              done
            done | jq -s -c .
          )"
          jq -e 'length == 8' <<< "$bootstrap_matrix_json"
