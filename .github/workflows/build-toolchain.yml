name: Build PyStudio Toolchain Matrix

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Toolchain profile."
        required: false
        type: choice
        default: python
        options:
          - python
          - python-build
          - python-science
          - python-data
          - python-image
          - python-viz
          - python-xml-html
          - python-crypto-network
          - python-gui-tk
          - all-python
          - python-lsp
          - cpp-lsp
          - debug-tools
          - git
          - all-dev-tools
          - proot
          - proot-distro
          - proot-full
          - nodejs
          - cpp
          - all
      source:
        description: "Source adapter."
        required: false
        type: choice
        default: primary
        options:
          - primary
          - secondary
          - tur
      architectures:
        description: "Target architectures, comma-separated."
        required: false
        default: aarch64,arm,i686,x86_64
      packages:
        description: "Optional package override, space or comma separated."
        required: false
        default: ""
      publish_release:
        description: "Publish artifacts to a GitHub release."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: pystudio-toolchain-matrix-${{ github.ref }}-${{ inputs.profile || 'default' }}-${{ inputs.source || 'primary' }}
  cancel-in-progress: false

env:
  PYSTUDIO_PACKAGE_NAME: com.vchangxiao.pystudio

jobs:
  resolve-inputs:
    name: Resolve matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
      packages: ${{ steps.resolve.outputs.packages }}
      publish_release: ${{ steps.resolve.outputs.publish_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve workflow inputs
        id: resolve
        shell: bash
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_ARCHITECTURES: ${{ github.event.inputs.architectures }}
          INPUT_PACKAGES: ${{ github.event.inputs.packages }}
          INPUT_PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
        run: |
          set -euo pipefail

          profile="${INPUT_PROFILE:-python}"
          source="${INPUT_SOURCE:-primary}"
          architectures="${INPUT_ARCHITECTURES:-aarch64,arm,i686,x86_64}"
          packages="$(tr ',' ' ' <<< "${INPUT_PACKAGES:-}" | xargs || true)"
          publish_release="${INPUT_PUBLISH_RELEASE:-true}"

          python_profiles="python python-build python-science python-data python-image python-viz python-xml-html python-crypto-network python-gui-tk"
          dev_tool_profiles="python-lsp cpp-lsp debug-tools git"

          if [[ "$profile" == "all" ]]; then
            profiles="python nodejs proot proot-distro cpp"
          elif [[ "$profile" == "all-python" ]]; then
            profiles="$python_profiles"
          elif [[ "$profile" == "all-dev-tools" ]]; then
            profiles="$dev_tool_profiles"
          else
            profiles="$profile"
          fi

          sources="$source"

          arch_list="$(tr ',' ' ' <<< "$architectures")"
          for arch in $arch_list; do
            case "$arch" in
              aarch64|arm|i686|x86_64) ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
          done

          matrix_json="$(
            for p in $profiles; do
              [[ -f "profiles/toolchains/$p.env" ]] || { echo "Unknown profile: $p" >&2; exit 1; }
              for s in $sources; do
                case "$s" in primary|secondary|tur) ;; *) echo "Unknown source: $s" >&2; exit 1 ;; esac
                for a in $arch_list; do
                  jq -n --arg profile "$p" --arg source "$s" --arg arch "$a" \
                    '{profile: $profile, source: $source, arch: $arch}'
                done
              done
            done | jq -s -c .
          )"

          {
            echo "matrix_json=$matrix_json"
            echo "packages=$packages"
            echo "publish_release=$publish_release"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.profile }} / ${{ matrix.source }} / ${{ matrix.arch }}
    needs: resolve-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-inputs.outputs.matrix_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: bash scripts/ci/free-space.sh

      - name: Enable swap
        shell: bash
        run: |
          set -euo pipefail
          swap_size=16G
          if [[ "${{ matrix.profile }}" == "cpp-lsp" && "${{ matrix.arch }}" == "aarch64" ]]; then
            swap_size=4G
          fi
          bash scripts/ci/enable-swap.sh "$swap_size"

      - name: Build toolchain packages
        shell: bash
        env:
          PACKAGE_OVERRIDE: ${{ needs.resolve-inputs.outputs.packages }}
        run: |
          set -euo pipefail
          bash scripts/ci/build-toolchain.sh "${{ matrix.profile }}" "${{ matrix.source }}" "${{ matrix.arch }}" "$PACKAGE_OVERRIDE"

      - name: Build package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/create-package-repo.sh \
            "${{ matrix.profile }}" \
            "${{ matrix.source }}" \
            "${{ matrix.arch }}" \
            "pystudio-${{ matrix.profile }}-toolchain-${{ matrix.source }}" \
            "r${{ github.run_number }}"

      - name: Upload package repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pystudio-${{ matrix.profile }}-toolchain-${{ matrix.source }}-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            dist/toolchains/${{ matrix.profile }}/${{ matrix.source }}/${{ matrix.arch }}/*-apt-repo-v1-*/
            dist/toolchains/${{ matrix.profile }}/${{ matrix.source }}/${{ matrix.arch }}/*-apt-repo-v1-*-flat/*
            dist/toolchains/${{ matrix.profile }}/${{ matrix.source }}/${{ matrix.arch }}/*-apt-repo-v1-*.tar.gz
            dist/toolchains/${{ matrix.profile }}/${{ matrix.source }}/${{ matrix.arch }}/*-apt-repo-v1-*.tar.gz.sha256
            dist/toolchains/${{ matrix.profile }}/${{ matrix.source }}/${{ matrix.arch }}/*-apt-repo-v1-*.json
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - resolve-inputs
      - build
    if: ${{ needs.resolve-inputs.outputs.publish_release == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -type f -print | sort

      - name: Prepare deduplicated release assets
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/prepare-release-assets.py \
            --artifacts-dir artifacts \
            --output-dir release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pystudio-toolchains-r${{ github.run_number }}
          name: PyStudio toolchains r${{ github.run_number }}
          files: |
            release-assets/*

      - name: Trigger runtime package manifest sync
        shell: bash
        env:
          PYSTUDIO_SYNC_TOKEN: ${{ secrets.PYSTUDIO_SYNC_TOKEN }}
          RELEASE_TAG: pystudio-toolchains-r${{ github.run_number }}
        run: |
          set -euo pipefail
          if [[ -z "$PYSTUDIO_SYNC_TOKEN" ]]; then
            echo "PYSTUDIO_SYNC_TOKEN is not configured; skipping manifest sync dispatch."
            exit 0
          fi
          payload="$(
            jq -n \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg release_tag "$RELEASE_TAG" \
              '{event_type:"runtime-packages-sync", client_payload:{source_repository:$repository, release_tag:$release_tag}}'
          )"
          curl --fail --show-error --silent --location \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PYSTUDIO_SYNC_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/vg188/pystudio-termux-builds/dispatches \
            -d "$payload"
