name: Backfill PyStudio Component Assets

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Optional comma-separated release tags. Empty means latest matching releases."
        required: false
        default: ""
      repositories:
        description: "Comma-separated repositories to backfill."
        required: false
        default: "vg188/pystudio-termux-builds,vg188/pystudio-python-toolchain,vg188/pystudio-nodejs-toolchain,vg188/pystudio-cpp-toolchain,vg188/pystudio-tree-sitter-toolchain,vg188/pystudio-node-build-core-toolchain,vg188/pystudio-python-extensions"
      migration_plan:
        description: "Migration plan file generated from the legacy runtime manifest. Empty disables plan mode."
        required: false
        default: "migration/runtime-packages-v2-components.json"
      max_releases:
        description: "Maximum matching releases per repository when tags is empty. 0 means all."
        required: false
        default: "5"
      force_upload:
        description: "Upload component assets even if matching assets already exist."
        required: false
        type: boolean
        default: false
      sync_manifest:
        description: "Trigger runtime manifest sync after backfill."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: pystudio-component-backfill-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill-components:
    name: Backfill component assets
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backfill existing release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.PYSTUDIO_SYNC_TOKEN }}
          INPUT_TAGS: ${{ github.event.inputs.tags || '' }}
          INPUT_REPOSITORIES: ${{ github.event.inputs.repositories || 'vg188/pystudio-termux-builds' }}
          INPUT_MIGRATION_PLAN: ${{ github.event.inputs.migration_plan || 'migration/runtime-packages-v2-components.json' }}
          INPUT_MAX_RELEASES: ${{ github.event.inputs.max_releases || '0' }}
          INPUT_FORCE_UPLOAD: ${{ github.event.inputs.force_upload || 'false' }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_MIGRATION_PLAN" && -f "$INPUT_MIGRATION_PLAN" ]]; then
            args=(--migration-plan "$INPUT_MIGRATION_PLAN")
            if [[ "$INPUT_FORCE_UPLOAD" == "true" ]]; then
              args+=(--force-upload)
            fi
            python3 scripts/ci/backfill-release-components.py "${args[@]}"
            exit 0
          fi

          IFS=',' read -r -a repos <<< "$INPUT_REPOSITORIES"
          for repo in "${repos[@]}"; do
            repo="$(xargs <<< "$repo")"
            [[ -n "$repo" ]] || continue
            args=(
              --repo "$repo"
              --tags "$INPUT_TAGS"
              --max-releases "$INPUT_MAX_RELEASES"
            )
            if [[ "$INPUT_FORCE_UPLOAD" == "true" ]]; then
              args+=(--force-upload)
            fi
            python3 scripts/ci/backfill-release-components.py "${args[@]}"
          done

      - name: Trigger runtime package manifest sync
        if: ${{ github.event.inputs.sync_manifest != 'false' }}
        shell: bash
        env:
          PYSTUDIO_SYNC_TOKEN: ${{ secrets.PYSTUDIO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$PYSTUDIO_SYNC_TOKEN" ]]; then
            echo "PYSTUDIO_SYNC_TOKEN is not configured; skipping manifest sync dispatch."
            exit 0
          fi
          payload='{ "event_type": "runtime-packages-sync", "client_payload": { "source_repository": "'"$GITHUB_REPOSITORY"'" } }'
          curl --fail --show-error --silent --location \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PYSTUDIO_SYNC_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/vg188/pystudio-termux-builds/dispatches \
            -d "$payload"
